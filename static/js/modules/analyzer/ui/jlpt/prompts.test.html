<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>jlpt/prompts.js — tests</title>
  <style>
    body { font: 14px/1.5 -apple-system, "SF Pro Text", system-ui, sans-serif; padding: 20px; max-width: 880px; margin: 0 auto; }
    h1 { font-size: 18px; }
    .row { padding: 6px 10px; border-radius: 6px; margin: 4px 0; }
    .row.pass { background: #e7f9ed; border-left: 3px solid #34c759; }
    .row.fail { background: #ffe7e4; border-left: 3px solid #ff3b30; }
    .row .name { font-weight: 600; }
    .row .detail { opacity: .7; font-size: 12px; }
  </style>
</head>
<body>
  <h1>jlpt/prompts.js tests</h1>
  <div id="summary"></div>
  <div id="results"></div>

  <script type="module">
    import { promptFor, MODE_META, MODE_LEVEL_SUPPORT, stripFences } from './prompts.js';

    const results = [];
    function check(name, cond, detail) {
      results.push({ name, pass: !!cond, detail: detail || '' });
    }

    check('stripFences strips ```json fence',
      stripFences('```json\n{"a":1}\n```') === '{"a":1}');
    check('stripFences handles no fence', stripFences('{"a":1}') === '{"a":1}');
    check('stripFences handles empty', stripFences('') === '');
    check('stripFences handles null/undef',
      stripFences(null) === '' && stripFences(undefined) === '');

    const expectedModes = ['kadai','point','gist','hatsu','sokuji','togo','dialogue','dictation'];
    expectedModes.forEach(m => {
      check(`MODE_META has ${m}`,
        !!MODE_META[m] && !!MODE_META[m].emoji && !!MODE_META[m].nameJa);
    });

    check('kadai supports N5–N1',
      ['N5','N4','N3','N2','N1'].every(l => MODE_LEVEL_SUPPORT.kadai.includes(l)));
    check('togo only N1/N2',
      MODE_LEVEL_SUPPORT.togo.length === 2 &&
      MODE_LEVEL_SUPPORT.togo.includes('N1') &&
      MODE_LEVEL_SUPPORT.togo.includes('N2'));
    check('hatsu only N3/N4/N5',
      MODE_LEVEL_SUPPORT.hatsu.length === 3 &&
      !MODE_LEVEL_SUPPORT.hatsu.includes('N1'));

    const args = { article: 'サンプル記事です。', level: 'N3', count: 3 };
    expectedModes.forEach(m => {
      const p = promptFor(m, args);
      check(`promptFor(${m}) returns non-empty string`,
        typeof p === 'string' && p.length > 100,
        `length: ${p && p.length}`);
    });

    let threw = false;
    try { promptFor('bogus', args); } catch (_) { threw = true; }
    check('promptFor throws on unknown mode', threw);

    expectedModes.forEach(m => {
      const p = promptFor(m, { article: 'x', level: 'N2', count: 5 });
      check(`promptFor(${m}) mentions N2`, p.includes('N2'));
    });

    expectedModes.forEach(m => {
      const p = promptFor(m, args);
      check(`promptFor(${m}) requires strict JSON`,
        /strict JSON/i.test(p) && /no markdown/i.test(p));
    });

    ['kadai','point','gist','hatsu','sokuji','togo','dialogue'].forEach(m => {
      const p = promptFor(m, args);
      check(`${m} prompt has depth enrichment`,
        p.includes('"depth"') && p.includes('vocab') && p.includes('grammar') && p.includes('traps'));
    });

    const pass = results.filter(r => r.pass).length;
    const fail = results.length - pass;
    const summary = document.getElementById('summary');
    summary.innerHTML = `<h3 style="color:${fail===0?'#1d7d3f':'#ff3b30'};">
      ${fail === 0 ? '✓ ALL PASS' : '✗ ' + fail + ' FAILED'} — ${pass}/${results.length}
    </h3>`;

    const root = document.getElementById('results');
    results.forEach(r => {
      const row = document.createElement('div');
      row.className = 'row ' + (r.pass ? 'pass' : 'fail');
      row.innerHTML = `<span class="name">${r.pass ? '✓' : '✗'} ${r.name}</span>${r.detail ? ` <span class="detail">${r.detail}</span>` : ''}`;
      root.appendChild(row);
    });
  </script>
</body>
</html>
