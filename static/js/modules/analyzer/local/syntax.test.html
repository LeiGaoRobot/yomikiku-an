<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>analyzer / syntax test</title>
  <style>
    body { font: 14px/1.5 -apple-system, BlinkMacSystemFont, sans-serif; padding: 16px; }
    h2 { margin: 24px 0 8px; font-size: 15px; }
    table { border-collapse: collapse; margin: 4px 0 16px; }
    th, td { border: 1px solid #d4d4d8; padding: 4px 10px; text-align: left; vertical-align: top; }
    th { background: #f4f4f5; font-weight: 600; }
    .role-subject     { background: #e0f2fe; }
    .role-predicate   { background: #fde68a; }
    .role-object      { background: #fee2e2; }
    .role-modifier    { background: #ede9fe; }
    .role-conjunction { background: #dcfce7; }
    pre { background: #f4f4f5; padding: 12px; border-radius: 6px; white-space: pre-wrap; }
    .err { color: #c62828; font-weight: 600; }
  </style>
</head>
<body>
  <h1>analyzeSyntax() fixture</h1>
  <p>Runs the tagger on three sentences and prints a table per sentence. Eyeball the <code>role</code> column.</p>
  <div id="out">booting…</div>

  <!-- Match classic-script load order from index.html -->
  <script src="/static/libs/kuromoji.js"></script>

  <script type="module">
    import { analyzeSyntax } from './syntax.js';

    const out = document.getElementById('out');
    out.textContent = '';

    const sentences = [
      'これは本です。',
      '彼がりんごを食べた。',
      'だから行きません。',
    ];

    const expectations = [
      'は marks これ as subject; です is predicate.',
      '彼 = subject (が), りんご = object (を), 食べた (食べ/た) = predicate at end.',
      'だから = conjunction; 行き / ません = predicate at end.',
    ];

    function escapeHtml(s) {
      return String(s).replace(/[&<>"]/g, (c) => (
        { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]
      ));
    }

    for (let i = 0; i < sentences.length; i++) {
      const text = sentences[i];
      const h2 = document.createElement('h2');
      h2.textContent = `Case ${i + 1}: ${text}`;
      out.appendChild(h2);

      const note = document.createElement('div');
      note.textContent = 'Expect: ' + expectations[i];
      out.appendChild(note);

      try {
        const t0 = performance.now();
        const result = await analyzeSyntax(text);
        const dt = (performance.now() - t0).toFixed(1);

        const timing = document.createElement('div');
        timing.textContent = `(${dt} ms, ${result.tokens.length} tokens)`;
        out.appendChild(timing);

        const rows = result.tokens.map((tok) =>
          `<tr class="role-${escapeHtml(tok.role)}">` +
            `<td>${escapeHtml(tok.surface)}</td>` +
            `<td>${escapeHtml(tok.pos)}</td>` +
            `<td><b>${escapeHtml(tok.role)}</b></td>` +
            `<td>${escapeHtml(tok.readingKana)}</td>` +
          `</tr>`
        ).join('');

        const tableHtml =
          '<table>' +
          '<thead><tr><th>surface</th><th>pos</th><th>role</th><th>readingKana</th></tr></thead>' +
          '<tbody>' + rows + '</tbody></table>';
        const wrap = document.createElement('div');
        wrap.innerHTML = tableHtml;
        out.appendChild(wrap);
      } catch (err) {
        const e = document.createElement('pre');
        e.className = 'err';
        e.textContent = 'threw: ' + (err && err.message);
        out.appendChild(e);
      }
    }
  </script>
</body>
</html>
