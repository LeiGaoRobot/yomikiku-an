name: Tests

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Install Playwright (ad-hoc, not committed to package.json)
        run: |
          npm install --no-save playwright
          npx playwright install chromium --with-deps

      - name: Run test suite (12 *.test.html pages, 310 cases)
        run: npm test
